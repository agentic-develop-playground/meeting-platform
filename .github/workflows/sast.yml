name: sast

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    name: sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Install common tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Python
        if: hashFiles('**/*.py') != ''
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip

      - name: Python SAST
        if: hashFiles('**/*.py') != ''
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          pip install bandit
          bandit -r . -f json -o bandit-report.json --exclude '*test_*.py' || true
          high_count="$(jq '[.results[]? | select(.issue_severity == "HIGH")] | length' bandit-report.json)"
          total_count="$(jq '.results | length // 0' bandit-report.json)"
          if [ "$total_count" -gt 10 ] || [ "$high_count" -gt 0 ]; then
            jq '.results[]? | {severity: .issue_severity, test: .test_id, file: .filename, line: .line_number, msg: .issue_text}' bandit-report.json
            exit 1
          fi
